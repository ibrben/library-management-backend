services:
  backend:
    build:
      context: .
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AllowedHosts: ${ALLOWED_HOSTS:-*}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=library_management;Username=library;Password=library
      Jwt__Secret: ${JWT_SECRET:-local-development-jwt-secret-change-me}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
      Database__ApplyMigrationsOnStartup: "true"
      BootstrapAdmin__Enabled: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BootstrapAdmin__Username: ${ADMIN_USERNAME:-admin}
      BootstrapAdmin__Email: ${ADMIN_EMAIL:-admin@library.local}
      BootstrapAdmin__Password: ${ADMIN_PASSWORD:-Admin54321Dev}
      BootstrapAdmin__FirstName: ${ADMIN_FIRST_NAME:-System}
      BootstrapAdmin__LastName: ${ADMIN_LAST_NAME:-Administrator}
      SeedData__Enabled: ${SEED_DATA_ENABLED:-true}
      SeedData__Librarian__Username: ${LIBRARIAN_USERNAME:-librarian}
      SeedData__Librarian__Email: ${LIBRARIAN_EMAIL:-librarian@library.local}
      SeedData__Librarian__Password: ${LIBRARIAN_PASSWORD:-Librarian12345}
      SeedData__Librarian__FirstName: ${LIBRARIAN_FIRST_NAME:-Sample}
      SeedData__Librarian__LastName: ${LIBRARIAN_LAST_NAME:-Librarian}
      SeedData__EndUser__Username: ${END_USER_USERNAME:-member}
      SeedData__EndUser__Email: ${END_USER_EMAIL:-member@library.local}
      SeedData__EndUser__Password: ${END_USER_PASSWORD:-Member123456}
      SeedData__EndUser__FirstName: ${END_USER_FIRST_NAME:-Sample}
      SeedData__EndUser__LastName: ${END_USER_LAST_NAME:-Member}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library_management
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library_management"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
