services:
  backend:
    build:
      context: .
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=library_management;Username=library;Password=library
      Jwt__Secret: ${JWT_SECRET:-local-development-jwt-secret-change-me}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
      BootstrapAdmin__Username: ${ADMIN_USERNAME:-admin}
      BootstrapAdmin__Email: ${ADMIN_EMAIL:-admin@library.local}
      BootstrapAdmin__Password: ${ADMIN_PASSWORD:-ChangeMe12345}
      BootstrapAdmin__FirstName: ${ADMIN_FIRST_NAME:-System}
      BootstrapAdmin__LastName: ${ADMIN_LAST_NAME:-Administrator}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library_management
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library_management"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
